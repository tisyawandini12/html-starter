<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Gas & Suhu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .table-container { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4">IoT Real-Time Monitoring</h2>
    
    <div class="row text-center">
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Suhu</h5>
                <div class="stat-value" id="temp">--</div>
                <span>°C</span>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Kelembapan</h5>
                <div class="stat-value" id="hum">--</div>
                <span>%</span>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Gas LPG</h5>
                <div class="stat-value" id="lpg">--</div>
                <span>PPM</span>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3">
                <h5>Gas CO</h5>
                <div class="stat-value" id="co">--</div>
                <span>PPM</span>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card p-4">
                <h5>Grafik Riwayat Gas & Suhu</h5>
                <canvas id="myChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card p-4">
                <h5>Tabel Data Terkini</h5>
                <div class="table-container">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                1<th>Waktu</th>
                                <th>Suhu (°C)</th>
                                <th>Kelembapan (%)</th>
                                <th>LPG (PPM)</th>
                                <th>CO (PPM)</th>
                            </tr>
                        </thead>
                        <tbody id="data-table">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://dashboard-iot-46919-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. INISIALISASI GRAFIK ---
    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [
                { label: 'Suhu', data: [], borderColor: '#ff5733', fill: false },
                { label: 'LPG', data: [], borderColor: '#33ff57', fill: false },
                { label: 'CO', data: [], borderColor: '#3357ff', fill: false }
            ]
        },
        options: { responsive: true }
    });

    // --- 3. AMBIL DATA DARI FIREBASE ---
    db.ref("monitoring").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const time = new Date().toLocaleTimeString();

            // Update Kartu
            document.getElementById("temp").innerText = data.temperature.toFixed(1);
            document.getElementById("hum").innerText = data.humidity.toFixed(1);
            document.getElementById("lpg").innerText = data.gas.toFixed(2);
            document.getElementById("co").innerText = data.co_level ? data.co_level.toFixed(2) : "0";

            // Update Grafik (Maksimal 10 data terakhir)
            if (myChart.data.labels.length > 10) {
                myChart.data.labels.shift();
                myChart.data.datasets[0].data.shift();
                myChart.data.datasets[1].data.shift();
                myChart.data.datasets[2].data.shift();
            }
            myChart.data.labels.push(time);
            myChart.data.datasets[0].data.push(data.temperature);
            myChart.data.datasets[1].data.push(data.gas);
            myChart.data.datasets[2].data.push(data.co_level);
            myChart.update();

            // Update Tabel (Tambah baris ke atas)
            const table = document.getElementById("data-table");
            const row = `<tr>
                <td>${time}</td>
                <td>${data.temperature.toFixed(1)}</td>
                <td>${data.humidity.toFixed(1)}</td>
                <td>${data.gas.toFixed(2)}</td>
                <td>${data.co_level ? data.co_level.toFixed(2) : "0"}</td>
            </tr>`;
            table.innerHTML = row + table.innerHTML;
        }
    });
</script>
</body>
</html>
