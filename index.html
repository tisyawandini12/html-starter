<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #1e1e1e; border: none; border-radius: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .value-text { font-size: 2.5rem; font-weight: bold; color: #00d4ff; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-4">🚀 IoT Master Dashboard</h1>
            <p class="text-muted">Real-time Monitoring ESP32</p>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5>🌡️ Temperature</h5>
                    <div id="tempVal" class="value-text">--°C</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5>💧 Humidity</h5>
                    <div id="humVal" class="value-text">--%</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5>💨 Gas Level</h5>
                    <div id="gasVal" class="value-text">--</div>
                </div>
            </div>
        </div>

        <div class="card p-4 mb-4">
            <h5 class="mb-3">📊 History Data (Google Sheets)</h5>
            <div class="ratio ratio-16x9">
                <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS-GANTI-DENGAN-ID-PUBLISH-KAMU/pubhtml?widget=true&amp;headers=false"></iframe>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU0n-5jwBI-4raTBfaHG-mVcmHqSiLTwk",
            authDomain: "dashboard-iot-46919.firebaseapp.com",
            databaseURL: "https://dashboard-iot-46919-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dashboard-iot-46919",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil data real-time
        db.ref('monitoring').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('tempVal').innerText = data.temperature + "°C";
                document.getElementById('humVal').innerText = data.humidity + "%";
                document.getElementById('gasVal').innerText = data.gas;
            }
        });
    </script>
</body>
</html>
