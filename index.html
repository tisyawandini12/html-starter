<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Multi-Gas Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .val { font-size: 1.8rem; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>
<div class="container py-4">
    <h3 class="text-center mb-4">IoT Multi-Gas Dashboard</h3>
    
    <div class="row g-3 text-center mb-4">
        <div class="col-md-2 col-6"><div class="card p-2">Suhu<div class="val" id="t">--</div></div></div>
        <div class="col-md-2 col-6"><div class="card p-2">Hum<div class="val" id="h">--</div></div></div>
        <div class="col-md-2 col-6"><div class="card p-2">LPG<div class="val" id="lpg">--</div></div></div>
        <div class="col-md-2 col-6"><div class="card p-2">CO<div class="val" id="co">--</div></div></div>
        <div class="col-md-2 col-6"><div class="card p-2">H2<div class="val" id="h2">--</div></div></div>
        <div class="col-md-2 col-6"><div class="card p-2">CH4<div class="val" id="ch4">--</div></div></div>
    </div>

    <div class="card p-3 mb-4"><canvas id="chartGue" height="120"></canvas></div>

    <div class="table-responsive"><table class="table table-dark table-striped">
        <thead><tr><th>Waktu</th><th>LPG</th><th>CO</th><th>H2</th><th>CH4</th></tr></thead>
        <tbody id="tabelData"></tbody>
    </table></div>
</div>

<script>
    const config = { databaseURL: "https://dashboard-iot-46919-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config);
    const db = firebase.database();

    const ctx = document.getElementById('chartGue').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'LPG', data: [], borderColor: 'green', tension: 0.1 },
            { label: 'CO', data: [], borderColor: 'blue', tension: 0.1 },
            { label: 'H2', data: [], borderColor: 'orange', tension: 0.1 },
            { label: 'CH4', data: [], borderColor: 'red', tension: 0.1 }
        ]}
    });

    db.ref("monitoring").on("value", (s) => {
        const d = s.val();
        if (d) {
            const time = new Date().toLocaleTimeString();
            document.getElementById("t").innerText = d.temperature;
            document.getElementById("h").innerText = d.humidity;
            document.getElementById("lpg").innerText = d.gas_lpg.toFixed(1);
            document.getElementById("co").innerText = d.gas_co.toFixed(1);
            document.getElementById("h2").innerText = d.gas_h2.toFixed(1);
            document.getElementById("ch4").innerText = d.gas_ch4.toFixed(1);

            if(myChart.data.labels.length > 10) { myChart.data.labels.shift(); myChart.data.datasets.forEach(ds => ds.data.shift()); }
            myChart.data.labels.push(time);
            myChart.data.datasets[0].data.push(d.gas_lpg);
            myChart.data.datasets[1].data.push(d.gas_co);
            myChart.data.datasets[2].data.push(d.gas_h2);
            myChart.data.datasets[3].data.push(d.gas_ch4);
            myChart.update();

            const row = `<tr><td>${time}</td><td>${d.gas_lpg.toFixed(2)}</td><td>${d.gas_co.toFixed(2)}</td><td>${d.gas_h2.toFixed(2)}</td><td>${d.gas_ch4.toFixed(2)}</td></tr>`;
            document.getElementById("tabelData").innerHTML = row + document.getElementById("tabelData").innerHTML;
        }
    });
</script>
</body>
</html>
